<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Terms 1 & 2 Mathematics Review</title>
  
  <!-- Premium Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    /* Global Variables and Theme */
    :root {
      --bg-stage: #f3f4f6;       /* Presentation stage background */
      --bg-slide: #ffffff;       /* Pure white slide background */
      --text-main: #1f2937;      /* Dark charcoal */
      --text-muted: #6b7280;     /* Slate gray for notes/subtitles */
      --border-slide: #e5e7eb;   /* Border for slide effect */
      --accent-blue: #2563eb;
      
      /* Badge styles */
      --algebra-bg: #faf5ff;
      --algebra-text: #6b21a8;
      --algebra-border: #e9d5ff;
      
      --arithmetic-bg: #eff6ff;
      --arithmetic-text: #1e40af;
      --arithmetic-border: #bfdbfe;
      
      --probability-bg: #fff7ed;
      --probability-text: #c2410c;
      --probability-border: #ffedd5;
      
      --statistics-bg: #f0fdfa;
      --statistics-text: #0f766e;
      --statistics-border: #ccfbf1;
      
      --geometry-bg: #f0fdf4;
      --geometry-text: #166534;
      --geometry-border: #bbf7d0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--bg-stage);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Widescreen Slide Container */
    .slide {
      position: relative;
      background-color: var(--bg-slide);
      border-radius: 12px;
      border: 1px solid var(--border-slide);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 
                  0 10px 10px -5px rgba(0, 0, 0, 0.03), 
                  0 0 0 1px rgba(0, 0, 0, 0.03);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px;
      box-sizing: border-box;
      
      /* Setup for responsive text scaling */
      container-type: inline-size;
      container-name: slide;
      
      aspect-ratio: 16 / 9;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    @media (max-aspect-ratio: 16/9) {
      .slide {
        width: 90vw;
        height: auto;
      }
    }

    @media (min-aspect-ratio: 16/9) {
      .slide {
        height: 85vh;
        width: auto;
      }
    }

    /* View containers toggle classes */
    .view-container {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
      box-sizing: border-box;
      animation: fade-in 0.25s ease-in-out forwards;
    }

    .view-container.active {
      display: flex;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ==========================================================================
       VIEW 1: LAUNCH SCREEN STYLES (LARGE FONTS, 2-COLUMN VIEW FOR READABILITY)
       ========================================================================== */
    #launch-view {
      justify-content: flex-start;
      gap: 32px;
    }

    .launch-header {
      text-align: center;
      margin-bottom: 8px;
    }

    .launch-title {
      font-size: clamp(2.2rem, 4.8cqw, 3.8rem);
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }

    .launch-subtitle {
      font-size: clamp(1.1rem, 2.2cqw, 1.6rem);
      color: #4b5563;
      font-weight: 600;
    }

    /* Grid of Topic Selection Cards - 2 Columns for huge spacing and text size */
    .topics-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      width: 100%;
      flex-grow: 1;
      overflow-y: auto;
      padding-right: 8px;
      margin-bottom: 8px;
    }

    /* Clean modern scrollbar for grid */
    .topics-grid::-webkit-scrollbar {
      width: 12px;
    }
    .topics-grid::-webkit-scrollbar-track {
      background: transparent;
    }
    .topics-grid::-webkit-scrollbar-thumb {
      background-color: #cbd5e1;
      border-radius: 6px;
      border: 3px solid #ffffff;
    }
    .topics-grid::-webkit-scrollbar-thumb:hover {
      background-color: #94a3b8;
    }

    .topic-card {
      background-color: #ffffff;
      border: 2px solid var(--border-slide);
      border-radius: 12px;
      padding: 24px 30px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: left;
      min-height: 120px;
    }

    .topic-card:hover {
      border-color: var(--accent-blue);
      background-color: #f9fafb;
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.05);
    }

    .topic-card:active {
      transform: translateY(0);
    }

    .topic-week {
      font-size: clamp(12px, 1.6cqw, 16px);
      font-weight: 700;
      color: var(--accent-blue);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .topic-title {
      font-size: clamp(1.1rem, 2.2cqw, 1.45rem);
      font-weight: 800;
      color: var(--text-main);
      line-height: 1.35;
      flex-grow: 1;
    }

    .topic-meta {
      font-size: clamp(12px, 1.5cqw, 15px);
      color: #9ca3af;
      font-weight: 700;
      margin-top: 8px;
    }

    /* ==========================================================================
       VIEW 2: FLASHCARD PRACTICE SCREEN STYLES (BACK OF THE ROOM READABILITY)
       ========================================================================== */
    #flashcard-view {
      justify-content: space-between;
    }

    .slide-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      border-bottom: 1px solid #f3f4f6;
      padding-bottom: 16px;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-dot {
      width: 14px;
      height: 14px;
      background-color: var(--accent-blue);
      border-radius: 50%;
    }

    .logo-text {
      font-size: clamp(15px, 2cqw, 22px);
      font-weight: 700;
      color: #4b5563;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Topic category badge */
    .op-badge {
      font-size: clamp(13px, 1.8cqw, 18px);
      font-weight: 700;
      padding: 6px 20px;
      border-radius: 9999px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid transparent;
      transition: all 0.3s ease;
    }

    .badge-algebra { background-color: var(--algebra-bg); color: var(--algebra-text); border-color: var(--algebra-border); }
    .badge-arithmetic { background-color: var(--arithmetic-bg); color: var(--arithmetic-text); border-color: var(--arithmetic-border); }
    .badge-probability { background-color: var(--probability-bg); color: var(--probability-text); border-color: var(--probability-border); }
    .badge-statistics { background-color: var(--statistics-bg); color: var(--statistics-text); border-color: var(--statistics-border); }
    .badge-geometry { background-color: var(--geometry-bg); color: var(--geometry-text); border-color: var(--geometry-border); }

    /* Main Flashcard Outer Wrapper */
    .equation-outer {
      flex-grow: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      overflow: hidden;
      padding: 24px 0;
    }

    .equation-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      justify-content: center;
      align-items: center;
      gap: 24px;
      
      /* Slide-out & Slide-in transitions */
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease;
      will-change: transform, opacity;
      opacity: 1;
      transform: translateX(0);
    }

    /* Forward transition sliding classes */
    .equation-container.slide-out {
      opacity: 0;
      transform: translateX(-80px);
    }

    .equation-container.slide-in {
      opacity: 0;
      transform: translateX(80px);
    }

    /* Backward transition sliding classes */
    .equation-container.slide-out-right {
      opacity: 0;
      transform: translateX(80px);
    }

    .equation-container.slide-in-left {
      opacity: 0;
      transform: translateX(-80px);
    }

    /* Question Display Size Variants (Applied Dynamically) */
    .question-display {
      text-align: center;
      color: var(--text-main);
      line-height: 1.45;
      max-width: 90%;
      font-weight: 700;
      animation: fade-in 0.25s ease-out forwards;
    }
    .question-display.size-q-large {
      font-size: clamp(2.4rem, 6.2cqw, 4.8rem);
    }
    .question-display.size-q-medium {
      font-size: clamp(1.8rem, 4.8cqw, 3.4rem);
    }
    .question-display.size-q-small {
      font-size: clamp(1.4rem, 3.8cqw, 2.4rem);
    }

    /* Centered Answer + Walkthrough Wrapper */
    .answer-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      width: 100%;
      max-width: 90%;
      animation: reveal-pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes reveal-pop {
      0% {
        transform: scale(0.92);
        opacity: 0.5;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* Core Answer Size Variants (Applied Dynamically) */
    .answer-core-text {
      font-weight: 850;
      color: #059669; /* Emerald green */
      line-height: 1.25;
    }
    .answer-core-text.size-ans-large {
      font-size: clamp(3.5rem, 10cqw, 7.5rem);
    }
    .answer-core-text.size-ans-medium {
      font-size: clamp(2.6rem, 7.5cqw, 5.5rem);
    }
    .answer-core-text.size-ans-small {
      font-size: clamp(1.8rem, 5.5cqw, 3.8rem);
    }

    /* Walkthrough divider line */
    .answer-divider {
      width: 120px;
      height: 5px;
      background-color: var(--accent-blue);
      margin: 24px 0;
      border-radius: 9999px;
    }

    /* Solution Walkthrough Size Variants (Applied Dynamically) */
    .answer-walkthrough-text {
      font-weight: 600;
      color: #4b5563; /* Dark slate gray */
      line-height: 1.45;
      max-width: 85%;
    }
    .answer-walkthrough-text.size-wk-large {
      font-size: clamp(1.8rem, 4.5cqw, 3.2rem);
    }
    .answer-walkthrough-text.size-wk-medium {
      font-size: clamp(1.4rem, 3.5cqw, 2.4rem);
    }
    .answer-walkthrough-text.size-wk-small {
      font-size: clamp(1.1rem, 2.8cqw, 1.8rem);
    }

    /* Dynamic Fraction Styling */
    .fraction {
      display: inline-flex;
      flex-direction: column;
      vertical-align: middle;
      text-align: center;
      line-height: 1.1;
      padding: 0 4px;
      margin: 0 6px;
      font-weight: inherit;
    }
    
    .numerator {
      border-bottom: 2.5px solid currentColor;
      padding-bottom: 2px;
      font-size: 0.9em;
    }
    
    .denominator {
      padding-top: 2px;
      font-size: 0.9em;
    }

    /* Slide Footer Controls */
    .slide-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      border-top: 1px solid #f3f4f6;
      padding-top: 20px;
    }

    .footer-left {
      flex: 1;
      display: flex;
      justify-content: flex-start;
    }

    .footer-center {
      flex: 0 0 auto;
    }

    .footer-right {
      flex: 1;
      font-size: clamp(14px, 1.8cqw, 22px);
      color: var(--text-muted);
      text-align: right;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .btn-group {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* Large Room readable Buttons */
    .btn {
      border: none;
      padding: 16px 36px;
      font-size: clamp(14px, 1.8cqw, 20px);
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      letter-spacing: 0.03em;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      outline: none;
    }

    .btn-primary {
      background-color: #111827;
      color: #ffffff;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.06);
    }

    .btn-primary:hover:not(:disabled) {
      background-color: #1f2937;
      transform: translateY(-1.5px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(1px);
    }

    .btn-secondary {
      background-color: #ffffff;
      color: #374151;
      border: 1.5px solid #d1d5db;
    }

    .btn-secondary:hover:not(:disabled) {
      background-color: #f9fafb;
      border-color: #9ca3af;
      transform: translateY(-1.5px);
    }

    .btn-secondary:active:not(:disabled) {
      transform: translateY(1px);
    }

    .btn:focus-visible {
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.4);
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    /* ==========================================================================
       VIEW 3: COMPLETION SCREEN STYLES
       ========================================================================== */
    #completion-view {
      justify-content: center;
    }

    .completion-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      width: 100%;
      height: 100%;
      gap: 20px;
      padding: 40px;
    }

    .trophy-icon {
      font-size: clamp(3.5rem, 9cqw, 5.5rem);
      margin-bottom: 12px;
      animation: float-bounce 2s infinite ease-in-out;
    }

    @keyframes float-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .completion-title {
      font-size: clamp(1.6rem, 4cqw, 2.8rem);
      font-weight: 800;
      color: var(--text-main);
      letter-spacing: -0.02em;
    }

    .completion-subtitle {
      font-size: clamp(1.1rem, 2.2cqw, 1.5rem);
      color: #4b5563;
      margin-bottom: 24px;
      font-weight: 600;
    }

    .completion-buttons {
      display: flex;
      gap: 16px;
    }

    /* ==========================================================================
       RESPONSIVE SCREEN OVERRIDES
       ========================================================================== */
    @media (max-width: 768px) {
      .topics-grid {
        grid-template-columns: 1fr;
      }
      .slide {
        width: 95vw;
        padding: 24px;
      }
    }
  </style>
</head>
<body>

  <!-- Main Slides Deck Card -->
  <div class="slide">
  
    <!-- VIEW 1: LAUNCH SCREEN -->
    <div id="launch-view" class="view-container active">
      <div class="launch-header">
        <h1 class="launch-title">Terms 1 & 2 Mathematics Review</h1>
        <p class="launch-subtitle">Select a topic below to begin practice</p>
      </div>
      <div id="topics-grid" class="topics-grid">
        <!-- Topic cards injected dynamically by JavaScript -->
      </div>
    </div>
    
    <!-- VIEW 2: FLASHCARD PRACTICE SCREEN -->
    <div id="flashcard-view" class="view-container">
      <header class="slide-header">
        <div class="header-logo">
          <span class="logo-dot"></span>
          <span id="header-topic-title" class="logo-text">Topic Title</span>
        </div>
        <div id="op-badge" class="op-badge badge-algebra">Algebra</div>
      </header>
      
      <div class="equation-outer">
        <div id="question-box" class="equation-container">
          <!-- Question or Answer content completely replaces this area -->
        </div>
      </div>
      
      <footer class="slide-footer">
        <div class="footer-left">
          <button class="btn btn-secondary" onclick="backToMain()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            <span>All Topics</span>
          </button>
        </div>
        <div class="footer-center">
          <div class="btn-group">
            <button id="prev-btn" class="btn btn-secondary" onclick="prevQuestion()" disabled>Back</button>
            <button id="skip-btn" class="btn btn-secondary" onclick="skipQuestion()">Skip</button>
            <button id="action-btn" class="btn btn-primary" onclick="handleAction()">
              <span id="btn-label">Show Answer</span>
              <svg id="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>
        <div id="slide-counter" class="footer-right">
          Question 1 of 20
        </div>
      </footer>
    </div>
    
    <!-- VIEW 3: TOPIC COMPLETION SCREEN -->
    <div id="completion-view" class="view-container">
      <div class="completion-content">
        <div class="trophy-icon">🏆</div>
        <h2 class="completion-title">Topic Completed!</h2>
        <p id="completion-subtitle" class="completion-subtitle">Topic Title</p>
        <div class="completion-buttons">
          <button class="btn btn-primary" onclick="restartTopic()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
            </svg>
            <span>Restart Topic</span>
          </button>
          <button class="btn btn-secondary" onclick="backToMain()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            <span>Select Topic</span>
          </button>
        </div>
      </div>
    </div>
  
  </div>

        "answer_core": "15 m<sup>3</sup>",
        "answer_walkthrough": "Solution: Volume = 3 x 2 x 2.5 = 15"
      },
      {
        "number": 19,
        "question": "Find the total volume of a compound display block made of a rectangular base (8 cm long, 5 cm wide, 4 cm high) topped symmetrically by a right triangular prism roof. The triangular top shares the same length (8 cm) and width (5 cm), and features a triangle height of 4 cm.",
        "answer_core": "240 cm<sup>3</sup>",
        "answer_walkthrough": "Solution: Rectangular base volume = 8 x 5 x 4 = 160 cm<sup>3</sup>. Triangular top volume = (0.5 x 5 x 4) x 8 = 10 x 8 = 80 cm<sup>3</sup>. Combined Volume = 160 + 80 = 240"
      },
      {
        "number": 20,
        "question": "If you double the depth/length of a rectangular prism but keep its front face dimensions exactly the same, what happens to the total volume of that prism? Explain why.",
        "answer_core": "The total volume doubles. Because volume is calculated by multiplying the base face area by the length/depth, scaling the depth by a factor of 2 directly scales the resulting volume product by 2.",
        "answer_walkthrough": ""
      }
    ]
  }
];

    // State Variables
    let currentTopic = null;
    let questionIndex = 0;
    let showAnswer = false;
    let isTransitioning = false;

    // SVG Icons
    const eyeIcon = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>`;
    const arrowIcon = `<polyline points="9 18 15 12 9 6"></polyline>`;

    // Initial render of topic cards
    initApp();

    /**
     * Renders the grid of topics on the launch screen
     */
    function initApp() {
      const grid = document.getElementById('topics-grid');
      grid.innerHTML = '';
      
      flashcardData.forEach(topic => {
        const card = document.createElement('div');
        card.className = 'topic-card';
        card.onclick = () => selectTopic(topic.id);
        
        // Find Week number
        const match = topic.title.match(/Week\s+(\d+)/i);
        const weekNum = match ? match[1] : '';
        const rawTitle = topic.title.replace(/Week\s+\d+:\s*/i, '');
        
        card.innerHTML = `
          <div>
            <div class="topic-week">Week ${weekNum}</div>
            <div class="topic-title">${rawTitle}</div>
          </div>
          <div class="topic-meta">${topic.questions.length} Questions</div>
        `;
        
        grid.appendChild(card);
      });
    }

    /**
     * Selects a topic and enters the flashcard view
     */
    function selectTopic(topicId) {
      currentTopic = flashcardData.find(t => t.id === topicId);
      if (!currentTopic) return;
      
      questionIndex = 0;
      showAnswer = false;
      
      // Update badge category
      updateOperationBadge(currentTopic.title);
      
      // Render question content
      renderQuestion();
      
      // Switch view to flashcard practice
      switchView('flashcard-view');
    }

    /**
     * Helper to get clean plain text length (ignoring HTML tags)
     */
    function getPlainTextLength(html) {
      const temp = document.createElement('div');
      temp.innerHTML = html;
      return temp.textContent.trim().length;
    }

    /**
     * Dynamically sets class names on question/answer displays to size text optimally
     */
    function applyDynamicFontSize(element, htmlContent, isAnswer = false) {
      const len = getPlainTextLength(htmlContent);
      let sizeClass = '';
      
      if (isAnswer) {
        if (len < 18) sizeClass = 'size-ans-large';
        else if (len < 55) sizeClass = 'size-ans-medium';
        else sizeClass = 'size-ans-small';
      } else {
        if (len < 45) sizeClass = 'size-q-large';
        else if (len < 120) sizeClass = 'size-q-medium';
        else sizeClass = 'size-q-small';
      }
      
      element.className = isAnswer ? 'answer-core-text ' + sizeClass : 'question-display ' + sizeClass;
    }

    /**
     * Dynamically sets class names on solution walkthrough text
     */
    function applyWalkthroughFontSize(element, htmlContent) {
      const len = getPlainTextLength(htmlContent);
      let sizeClass = 'size-wk-medium';
      
      if (len < 55) sizeClass = 'size-wk-large';
      else if (len > 160) sizeClass = 'size-wk-small';
      
      element.className = 'answer-walkthrough-text ' + sizeClass;
    }

    /**
     * Renders the current question to the view, hiding the answer
     */
    function renderQuestion() {
      if (!currentTopic || !currentTopic.questions[questionIndex]) return;
      
      const qObj = currentTopic.questions[questionIndex];
      
      // Update title text in header
      const match = currentTopic.title.match(/Week\s+(\d+)/i);
      const weekNum = match ? `Week ${match[1]}` : 'Practice';
      document.getElementById('header-topic-title').textContent = weekNum;
      
      // Clear container and write question
      const container = document.getElementById('question-box');
      
      const qDiv = document.createElement('div');
      qDiv.innerHTML = qObj.question;
      applyDynamicFontSize(qDiv, qObj.question, false);
      
      container.innerHTML = '';
      container.appendChild(qDiv);
      
      showAnswer = false;
      
      // Reset action button
      document.getElementById('btn-label').textContent = 'Show Answer';
      document.getElementById('btn-icon').innerHTML = eyeIcon;
      
      // Enable/disable Back button
      const prevBtn = document.getElementById('prev-btn');
      if (questionIndex === 0) {
        prevBtn.disabled = true;
      } else {
        prevBtn.disabled = false;
      }
      
      // Update bottom slide counter
      const totalQuestions = currentTopic.questions.length;
      document.getElementById('slide-counter').textContent = `Question ${questionIndex + 1} of ${totalQuestions}`;
    }

    /**
     * Toggles between "Show Answer" and "Next"
     */
    function handleAction() {
      if (isTransitioning) return;
      document.getElementById('action-btn').blur();

      if (!showAnswer) {
        revealAnswer();
      } else {
        advanceQuestion();
      }
    }

    /**
     * Replaces the question with the large answer and smaller walkthrough
     */
    function revealAnswer() {
      if (!currentTopic || !currentTopic.questions[questionIndex]) return;
      
      const qObj = currentTopic.questions[questionIndex];
      showAnswer = true;
      
      const container = document.getElementById('question-box');
      
      // Construct wrappers
      const wrapper = document.createElement('div');
      wrapper.className = 'answer-display';
      
      const ansCore = document.createElement('div');
      ansCore.innerHTML = qObj.answer_core;
      applyDynamicFontSize(ansCore, qObj.answer_core, true);
      wrapper.appendChild(ansCore);
      
      if (qObj.answer_walkthrough) {
        const divider = document.createElement('div');
        divider.className = 'answer-divider';
        wrapper.appendChild(divider);
        
        const ansWk = document.createElement('div');
        ansWk.innerHTML = qObj.answer_walkthrough;
        applyWalkthroughFontSize(ansWk, qObj.answer_walkthrough);
        wrapper.appendChild(ansWk);
      }
      
      container.innerHTML = '';
      container.appendChild(wrapper);
      
      // Change Button State to Next Problem
      document.getElementById('btn-label').textContent = 'Next';
      document.getElementById('btn-icon').innerHTML = arrowIcon;
    }

    /**
     * Navigates to the PREVIOUS question
     */
    function prevQuestion() {
      if (isTransitioning || !currentTopic || questionIndex === 0) return;
      document.getElementById('prev-btn').blur();
      
      runSlideTransitionBackward(() => {
        questionIndex--;
        renderQuestion();
      });
    }

    /**
     * Skips the current question without showing the answer
     */
    function skipQuestion() {
      if (isTransitioning) return;
      document.getElementById('skip-btn').blur();
      advanceQuestion();
    }

    /**
     * Moves to the next question or completion screen
     */
    function advanceQuestion() {
      const totalQuestions = currentTopic.questions.length;
      
      if (questionIndex === totalQuestions - 1) {
        // End of topic: Show Completion screen
        document.getElementById('completion-subtitle').textContent = currentTopic.title;
        switchView('completion-view');
      } else {
        // Advance to next question with a forward slide transition
        runSlideTransition(() => {
          questionIndex++;
          renderQuestion();
        });
      }
    }

    /**
     * Runs the forward slide transition (slides left, new content slides in from right)
     */
    function runSlideTransition(callback) {
      isTransitioning = true;
      const container = document.getElementById('question-box');
      
      container.classList.add('slide-out');
      
      setTimeout(() => {
        callback();
        
        container.classList.remove('slide-out');
        container.classList.add('slide-in');
        
        // Force reflow
        container.offsetHeight;
        
        container.classList.remove('slide-in');
        isTransitioning = false;
      }, 250);
    }

    /**
     * Runs the backward slide transition (slides right, new content slides in from left)
     */
    function runSlideTransitionBackward(callback) {
      isTransitioning = true;
      const container = document.getElementById('question-box');
      
      container.classList.add('slide-out-right');
      
      setTimeout(() => {
        callback();
        
        container.classList.remove('slide-out-right');
        container.classList.add('slide-in-left');
        
        // Force reflow
        container.offsetHeight;
        
        container.classList.remove('slide-in-left');
        isTransitioning = false;
      }, 250);
    }

    /**
     * RESTARTS current topic from question 1
     */
    function restartTopic() {
      questionIndex = 0;
      showAnswer = false;
      renderQuestion();
      switchView('flashcard-view');
    }

    /**
     * GOES back to the launch screen
     */
    function backToMain() {
      currentTopic = null;
      switchView('launch-view');
    }

    /**
     * Switches view between launch-view, flashcard-view, and completion-view
     */
    function switchView(viewId) {
      document.querySelectorAll('.view-container').forEach(view => {
        view.classList.remove('active');
      });
      document.getElementById(viewId).classList.add('active');
    }

    /**
     * Determines and updates the top right category badge
     */
    function updateOperationBadge(title) {
      const badge = document.getElementById('op-badge');
      badge.className = 'op-badge'; // Reset classes
      
      const upperTitle = title.toUpperCase();
      let category = 'Math Review';
      let badgeClass = 'badge-arithmetic';
      
      if (upperTitle.includes("ALGEBRA")) {
        category = 'Algebra';
        badgeClass = 'badge-algebra';
      } else if (upperTitle.includes("PROBABILITY")) {
        category = 'Probability';
        badgeClass = 'badge-probability';
      } else if (upperTitle.includes("STATISTICS")) {
        category = 'Statistics';
        badgeClass = 'badge-statistics';
      } else if (upperTitle.includes("GEOMETRY") || upperTitle.includes("VOLUME")) {
        category = 'Geometry';
        badgeClass = 'badge-geometry';
      } else if (upperTitle.includes("FRACTION") || upperTitle.includes("PERCENTAGE") || upperTitle.includes("DECIMAL") || upperTitle.includes("OPERATIONS")) {
        category = 'Arithmetic';
        badgeClass = 'badge-arithmetic';
      }
      
      badge.textContent = category;
      badge.classList.add(badgeClass);
    }

    // Keyboard controls support
    document.addEventListener('keydown', (event) => {
      const activeView = document.querySelector('.view-container.active');
      if (activeView && activeView.id === 'flashcard-view') {
        if (event.code === 'Space' || event.code === 'Enter') {
          event.preventDefault();
          handleAction();
        } else if (event.code === 'ArrowLeft') {
          event.preventDefault();
          prevQuestion();
        } else if (event.code === 'ArrowRight') {
          event.preventDefault();
          handleAction();
        }
      } else if (activeView && activeView.id === 'completion-view') {
        if (event.code === 'Space' || event.code === 'Enter') {
          event.preventDefault();
          restartTopic();
        }
      }
    });
  </script>
</body>
</html>
