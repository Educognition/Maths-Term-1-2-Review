<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Maths Review - Terms 1 & 2</title>
  
  <!-- Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-gradient: radial-gradient(circle at 50% 50%, #0d111d 0%, #07080e 100%);
      --panel-bg: rgba(255, 255, 255, 0.025);
      --panel-border: rgba(255, 255, 255, 0.07);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
      
      --accent-purple: #8b5cf6;
      --accent-purple-glow: rgba(139, 92, 246, 0.4);
      --accent-cyan: #06b6d4;
      --accent-cyan-glow: rgba(6, 182, 212, 0.4);
      --accent-green: #10b981;
      --accent-green-glow: rgba(16, 185, 129, 0.4);
      
      --shadow-lg: 0 20px 50px -15px rgba(0, 0, 0, 0.7);
      --transition-smooth: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
      --transition-fast: all 0.15s ease;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Fullscreen Confetti Canvas */
    #confetti-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 90;
    }

    /* Dashboard (Week Selector Grid) View */
    .dashboard-view {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      padding: 6vh 6vw;
      overflow-y: auto;
      z-index: 10;
      position: absolute;
      top: 0;
      left: 0;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
    }

    .dashboard-view::-webkit-scrollbar {
      width: 6px;
    }
    .dashboard-view::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    .dashboard-header {
      text-align: center;
      margin-bottom: 5vh;
    }

    .dashboard-header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 4.8vh;
      font-weight: 800;
      background: linear-gradient(135deg, #c084fc, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.2vh;
      letter-spacing: -0.01em;
    }

    .dashboard-header p {
      font-size: 2vh;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .weeks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 2.5vh 2vw;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
      padding-bottom: 4vh;
    }

    .week-card {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      padding: 3.5vh 2.2vw;
      cursor: pointer;
      transition: var(--transition-smooth);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 1.5vh;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      height: 18vh;
      min-height: 140px;
    }

    .week-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.04), transparent 70%);
      z-index: 0;
    }

    .week-card:hover {
      transform: translateY(-5px) scale(1.02);
      border-color: rgba(139, 92, 246, 0.35);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4), 0 0 25px rgba(139, 92, 246, 0.12);
    }

    .week-card-number {
      font-family: 'Outfit', sans-serif;
      font-size: 1.5vh;
      font-weight: 700;
      color: var(--accent-purple);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      position: relative;
      z-index: 1;
    }

    .week-card-title {
      font-family: 'Outfit', sans-serif;
      font-size: 2.3vh;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.3;
      margin-top: auto;
      position: relative;
      z-index: 1;
    }

    .week-card-questions {
      font-size: 1.4vh;
      color: var(--text-secondary);
      font-weight: 500;
      position: relative;
      z-index: 1;
    }

    /* Sidebar Drawer Styles */
    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .sidebar-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -420px;
      width: 420px;
      height: 100vh;
      background: rgba(8, 10, 20, 0.88);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 100;
      transition: left 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      display: flex;
      flex-direction: column;
      box-shadow: 20px 0 50px rgba(0, 0, 0, 0.6);
    }

    .sidebar.open {
      left: 0;
    }

    .sidebar-header {
      padding: 4vh 2vw 2vh 2vw;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .sidebar-header h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.8vh;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #a78bfa, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sidebar-header p {
      font-size: 1.5vh;
      color: var(--text-secondary);
      font-weight: 500;
      margin-top: 0.5vh;
    }

    .close-btn {
      position: absolute;
      top: 3.5vh;
      right: 2vw;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 3.5vh;
      cursor: pointer;
      line-height: 1;
      transition: var(--transition-fast);
    }

    .close-btn:hover {
      color: white;
    }

    .sidebar-menu {
      flex: 1;
      overflow-y: auto;
      padding: 2vh 1.2vw;
      display: flex;
      flex-direction: column;
      gap: 1.2vh;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
    }

    .sidebar-menu::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar-menu::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    .menu-item {
      padding: 1.8vh 1.5vw;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid rgba(255, 255, 255, 0.03);
      cursor: pointer;
      transition: var(--transition-fast);
      display: flex;
      flex-direction: column;
      gap: 0.4vh;
      text-align: left;
    }

    .menu-item:hover {
      background: rgba(255, 255, 255, 0.03);
      border-color: rgba(255, 255, 255, 0.08);
      transform: translateX(3px);
    }

    .menu-item.active {
      background: rgba(139, 92, 246, 0.07);
      border-color: rgba(139, 92, 246, 0.25);
      box-shadow: inset 0 0 15px rgba(139, 92, 246, 0.05);
    }

    .menu-item-week {
      font-family: 'Outfit', sans-serif;
      font-size: 1.3vh;
      font-weight: 700;
      color: var(--accent-purple);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .menu-item.active .menu-item-week {
      color: var(--accent-cyan);
    }

    .menu-item-title {
      font-size: 1.7vh;
      font-weight: 600;
      color: var(--text-secondary);
      line-height: 1.25;
    }

    .menu-item.active .menu-item-title {
      color: var(--text-primary);
    }

    /* Main Container layout */
    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      padding: 3vh 4vw;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 5;
    }

    /* Top Bar Header */
    .app-header {
      height: 10vh;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      padding-bottom: 2vh;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1.5vw;
    }

    .menu-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      width: 6vh;
      height: 6vh;
      border-radius: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-fast);
    }

    .menu-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      transform: scale(1.05);
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--text-secondary);
      padding: 1.2vh 2.4vh;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.8vh;
      font-size: 1.8vh;
      font-weight: 600;
      transition: var(--transition-fast);
      font-family: 'Outfit', sans-serif;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      color: var(--text-primary);
      transform: translateX(-3px);
    }

    .back-btn:active {
      transform: translateX(1px);
    }

    .week-info {
      display: flex;
      flex-direction: column;
    }

    .week-label {
      font-family: 'Outfit', sans-serif;
      font-size: 1.6vh;
      font-weight: 700;
      color: var(--accent-purple);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      line-height: 1.2;
    }

    .week-title {
      font-family: 'Outfit', sans-serif;
      font-size: 3.2vh;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .header-right {
      display: flex;
      align-items: center;
    }

    .slide-counter {
      font-size: 2vh;
      font-weight: 600;
      color: var(--text-secondary);
      background: rgba(255, 255, 255, 0.03);
      padding: 1.2vh 2.4vh;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .progress-bar-container {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 10%;
      background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan));
      border-radius: 2px;
      transition: width 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    /* Main Slide Deck */
    .slide-deck {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 3vh 0;
    }

    .slide-card-container {
      width: 100%;
      height: 100%;
      max-width: 1500px;
      max-height: 72vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .slide-card {
      width: 100%;
      height: 100%;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 4vh 4vw;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
      
      /* Card Slide Transitions */
      transition: transform 0.28s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.28s cubic-bezier(0.25, 0.8, 0.25, 1);
      transform: scale(1) translateX(0);
      opacity: 1;
    }

    /* Slide transition classes */
    .slide-exit-next {
      transform: translateX(-80px) scale(0.97);
      opacity: 0;
    }
    .slide-exit-prev {
      transform: translateX(80px) scale(0.97);
      opacity: 0;
    }
    .slide-enter-next {
      transform: translateX(80px) scale(0.97);
      opacity: 0;
    }
    .slide-enter-prev {
      transform: translateX(-80px) scale(0.97);
      opacity: 0;
    }

    /* Slide Card Sections */
    .question-box {
      height: 23vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
      padding: 0 1vw;
    }

    #question-text {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.4;
      width: 100%;
    }

    .card-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
      margin: 1.5vh 0;
    }

    .reveal-section {
      height: 33vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      width: 100%;
    }

    /* Large Glowing Reveal Button */
    .reveal-btn {
      background: linear-gradient(135deg, #5b21b6, #7c3aed);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      color: white;
      padding: 3.5vh 6vw;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: 0 15px 35px -5px rgba(124, 58, 237, 0.5), 0 0 30px rgba(124, 58, 237, 0.15);
      transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.2s ease, border-color 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.8vh;
    }

    .reveal-btn:hover {
      transform: translateY(-3px) scale(1.02);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 20px 45px -5px rgba(124, 58, 237, 0.6), 0 0 40px rgba(124, 58, 237, 0.3);
    }

    .reveal-btn:active {
      transform: translateY(1px) scale(0.99);
    }

    .reveal-btn-glow {
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
      transition: left 0.8s ease;
    }

    .reveal-btn:hover .reveal-btn-glow {
      left: 100%;
    }

    .reveal-btn-text {
      font-family: 'Outfit', sans-serif;
      font-size: 3.4vh;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .reveal-btn-hint {
      font-size: 1.5vh;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Answer Details Card layout */
    .answer-details {
      width: 100%;
      height: 100%;
      display: none; /* Controlled by Javascript */
      flex-direction: column;
      gap: 1.5vh;
      justify-content: center;
    }

    .answer-details.visible {
      display: flex;
      animation: slideUpReveal 0.4s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
    }

    @keyframes slideUpReveal {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .answer-card, .process-card {
      background: rgba(255, 255, 255, 0.015);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 18px;
      padding: 1.5vh 2.5vw;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: var(--transition-smooth);
    }

    .answer-card {
      flex: 1.2;
      border-left: 6px solid var(--accent-green);
      box-shadow: inset 6px 0 24px -6px rgba(16, 185, 129, 0.12);
    }

    .process-card {
      flex: 0.8;
      border-left: 4px solid var(--accent-cyan);
      box-shadow: inset 4px 0 20px -6px rgba(6, 182, 212, 0.08);
      background: rgba(255, 255, 255, 0.008);
    }

    .card-label {
      font-family: 'Outfit', sans-serif;
      font-size: 1.4vh;
      font-weight: 700;
      color: var(--text-secondary);
      letter-spacing: 0.12em;
      margin-bottom: 0.3vh;
      text-transform: uppercase;
    }

    .card-content {
      font-weight: 600;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    /* Pop-out Huge Answer style */
    .answer-content {
      color: var(--accent-green);
      font-weight: 850;
      font-family: 'Outfit', sans-serif;
      text-shadow: 0 0 20px rgba(16, 185, 129, 0.35);
      transform: scale(1);
      opacity: 0;
      animation: popOutAnswer 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
      animation-delay: 0.08s;
    }

    @keyframes popOutAnswer {
      0% {
        transform: scale(0.85);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .process-content {
      color: #cbd5e1;
      font-family: 'Fira Code', monospace;
      font-weight: 400;
      line-height: 1.25;
    }

    /* Math Expressions Styles */
    .math-var {
      font-family: 'Outfit', sans-serif;
      font-style: italic;
      font-weight: 600;
      color: #a5b4fc;
      text-shadow: 0 0 10px rgba(165, 180, 252, 0.25);
    }

    .fraction {
      display: inline-flex;
      flex-direction: column;
      vertical-align: middle;
      text-align: center;
      font-size: 0.88em;
      padding: 0 0.15em;
      line-height: 1;
      font-weight: 500;
      font-family: 'Fira Code', monospace;
    }
    .fraction .num {
      border-bottom: 1.5px solid currentColor;
      padding-bottom: 0.05em;
      min-width: 0.8em;
    }
    .fraction .den {
      padding-top: 0.05em;
      min-width: 0.8em;
    }

    /* Bottom Controls Area */
    .app-footer {
      height: 10vh;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      padding-top: 1vh;
    }

    .nav-btn {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      color: var(--text-primary);
      padding: 1.6vh 3.5vh;
      font-size: 1.8vh;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 1vh;
      transition: var(--transition-fast);
    }

    .nav-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.12);
      transform: translateY(-2px);
    }

    .nav-btn:active:not(:disabled) {
      transform: translateY(1px);
    }

    .nav-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    .prev-btn {
      color: var(--text-secondary);
    }

    .next-btn {
      background: rgba(139, 92, 246, 0.08);
      border-color: rgba(139, 92, 246, 0.25);
      color: #d8b4fe;
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.03);
    }

    .next-btn:hover:not(:disabled) {
      background: rgba(139, 92, 246, 0.18);
      border-color: rgba(139, 92, 246, 0.4);
      color: white;
      box-shadow: 0 0 25px rgba(139, 92, 246, 0.12);
    }

    /* Progress Navigation Dots */
    .nav-dots {
      display: flex;
      gap: 1.5vw;
      align-items: center;
    }

    .dot {
      width: 1.8vh;
      height: 1.8vh;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid transparent;
      cursor: pointer;
      transition: var(--transition-smooth);
      position: relative;
    }

    .dot:hover {
      transform: scale(1.3);
      background: rgba(255, 255, 255, 0.25);
    }

    .dot.active {
      background: var(--accent-cyan);
      box-shadow: 0 0 15px var(--accent-cyan);
      border-color: var(--text-primary);
      transform: scale(1.25);
    }

    .dot.completed {
      background: var(--accent-purple);
      box-shadow: 0 0 10px rgba(139, 92, 246, 0.4);
    }

    .dot::after {
      content: attr(data-q);
      position: absolute;
      bottom: 2.8vh;
      left: 50%;
      transform: translateX(-50%) translateY(5px);
      background: #0f172a;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      padding: 0.4vh 0.8vh;
      border-radius: 5px;
      font-size: 1.2vh;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transition: var(--transition-fast);
      white-space: nowrap;
      box-shadow: var(--shadow-lg);
    }

    .dot:hover::after {
      opacity: 1;

    // Confetti Animation Engine
    class ConfettiEngine {
      constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.particles = [];
        this.colors = ['#f59e0b', '#10b981', '#06b6d4', '#8b5cf6', '#ec4899'];
        this.active = false;
        this.resize();
        window.addEventListener('resize', () => this.resize());
      }
      
      resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
      }
      
      start() {
        this.particles = [];
        this.active = true;
        for (let i = 0; i < 120; i++) {
          this.particles.push({
            x: Math.random() * this.canvas.width,
            y: Math.random() * this.canvas.height - this.canvas.height,
            r: Math.random() * 6 + 4,
            d: Math.random() * this.canvas.height,
            color: this.colors[Math.floor(Math.random() * this.colors.length)],
            tilt: Math.random() * 10 - 5,
            tiltAngleIncremental: Math.random() * 0.05 + 0.02,
            tiltAngle: 0
          });
        }
        this.animate();
      }
      
      stop() {
        this.active = false;
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
      }
      
      animate() {
        if (!this.active) return;
        requestAnimationFrame(() => this.animate());
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        
        for (let i = 0; i < this.particles.length; i++) {
          let p = this.particles[i];
          p.tiltAngle += p.tiltAngleIncremental;
          p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
          p.x += Math.sin(p.tiltAngle);
          p.tilt = Math.sin(p.tiltAngle - i / 3) * 12;
          
          if (p.y > this.canvas.height) {
            p.y = -20;
            p.x = Math.random() * this.canvas.width;
          }
          
          this.ctx.beginPath();
          this.ctx.lineWidth = p.r;
          this.ctx.strokeStyle = p.color;
          this.ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
          this.ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
          this.ctx.stroke();
        }
      }
    }

    // Text formatting function for fractions, operators, variables and negative signs
    function formatMath(text) {
      if (!text) return "";
      
      let formatted = text;
      
      // Standardize degrees C display to modern °C symbol
      formatted = formatted.replace(/degrees\s+C\b/g, '&deg;C');
      
      // Superscripts for exponents (e.g. 2^2, cm^3, m^3)
      formatted = formatted.replace(/\^(\d+)/g, '<sup>$1</sup>');
      
      // Real mathematical multiplication symbol
      formatted = formatted.replace(/\s+x\s+/g, ' &times; ');
      formatted = formatted.replace(/\s*\*\s*/g, ' &times; ');
      
      // Fractions layout (e.g. 24/36, y/3)
      formatted = formatted.replace(/\b(\d+|[a-zA-Z])\/(\d+)\b/g, 
        '<span class="fraction"><span class="num">$1</span><span class="den">$2</span></span>');
      
      // Variables: numeric coefficients followed by single letters (e.g. 2x, 8x, 5a)
      formatted = formatted.replace(/(\d+(?:\.\d+)?)([xyabckmnC])\b/g, '$1<span class="math-var">$2</span>');
      
      // Standalone variables (e.g. x, y, b, c, m, n, k, C)
      formatted = formatted.replace(/\b([xybckmnC])\b/g, '<span class="math-var">$1</span>');
      
      // Standalone 'a' as a variable when surrounded by math context/operators
      formatted = formatted.replace(/(\s+[\+\-\=&times;]\s+)(a)\b/g, '$1<span class="math-var">$2</span>');
      formatted = formatted.replace(/\b(a)(\s+[\+\-\=&times;]\s+)/g, '<span class="math-var">$1</span>$2');
      
      // Negative integers: convert dash to non-breaking &minus;
      formatted = formatted.replace(/(^|[\s(])-(\d+)/g, '$1&minus;$2');
      
      return formatted;
    }

    // Dynamic Font-Sizing Engine (Fits text comfortably on the screen without overflow)
    function fitText(element, maxFontSizeVh) {
      element.style.fontSize = maxFontSizeVh + 'vh';
      let fontSize = maxFontSizeVh;
      const parent = element.parentElement;
      if (!parent) return;
      
      // Shrink step-by-step until element scrollheight is within parent bounds
      while ((element.scrollHeight > parent.clientHeight || element.scrollWidth > parent.clientWidth) && fontSize > 1.2) {
        fontSize -= 0.1;
        element.style.fontSize = fontSize + 'vh';
      }
    }

    }

    // Transition Animations and Slide loader
    function changeQuestionState(direction, callback) {
      const card = document.getElementById('slide-card');
      const exitClass = direction === 'next' ? 'slide-exit-next' : 'slide-exit-prev';
      const enterClass = direction === 'next' ? 'slide-enter-next' : 'slide-enter-prev';
      
      // Trigger card slide-out transition
      card.classList.add(exitClass);
      
      setTimeout(() => {
        callback(); // State update
        
        // Remove exit class and snap to initial enter coordinates
        card.classList.remove(exitClass);
        card.classList.add(enterClass);
        
        // Force reflow layout
        card.offsetHeight;
        
        // Remove enter class to let the card transition to default centered coordinates
        card.classList.remove(enterClass);
      }, 250);
    }

      // Next/Reveal Button display text
      document.getElementById('next-btn-text').textContent = isAnswerRevealed ? "NEXT" : "REVEAL";
      
      // Render the bottom navigation dot indicators
      renderDots();
      
      // Recalculate font sizing constraints
      setTimeout(autoSizeCardText, 10);
    }

    // Nav Dot indicator renderer
    function renderDots() {
      const dotsContainer = document.getElementById('nav-dots');
      dotsContainer.innerHTML = "";
      
      for (let i = 0; i < 10; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        
        if (i === currentQuestionIndex && !isCelebrationState) {
          dot.classList.add('active');
        } else if (i < currentQuestionIndex || isCelebrationState) {
          dot.classList.add('completed');
        }
        
        dot.setAttribute('data-q', `Q${i + 1}`);
        dot.onclick = () => {
          if (isCelebrationState) {
            isCelebrationState = false;
          }
          jumpToQuestion(i);
        };
        dotsContainer.appendChild(dot);
      }
    }

    // Reveal Logic
    function revealAnswer() {
      if (isAnswerRevealed || isCelebrationState) return;
      
      isAnswerRevealed = true;
      
      const btn = document.getElementById('reveal-btn');
      const details = document.getElementById('answer-details');
      const nextBtnText = document.getElementById('next-btn-text');
      
      if (btn) btn.style.display = 'none';
      if (details) {
        details.style.display = 'flex';
        // Force reflow
        details.offsetHeight;
        details.classList.add('visible');
      }
      if (nextBtnText) nextBtnText.textContent = "NEXT";
      
      // Recalculate font sizes of newly revealed items
      setTimeout(autoSizeCardText, 10);
    }

    // Next Action Control Flow (Presenter Clicker compatible)
    function nextQuestion() {
      // If we are on the celebration screen, next restart the entire deck
      if (isCelebrationState) {
        restartReview();
        return;
      }
      
      // Flow 1: If answer is hidden, reveal it first
      if (!isAnswerRevealed) {
        revealAnswer();
        return;
      }
      
      // Flow 2: If answer is already revealed, move forward
      if (currentQuestionIndex < 9) {
        // Move to next question within the same week
        changeQuestionState('next', () => {
          currentQuestionIndex++;
          isAnswerRevealed = false;
        });
      } else {
        // Reached Question 10 of current week. Move to next week or completion.
        if (currentWeekIndex < 10) {
          changeQuestionState('next', () => {
            currentWeekIndex++;
            currentQuestionIndex = 0;
            isAnswerRevealed = false;
            buildSidebar(); // Update sidebar active item
          });
        } else {
          // Reached final Question of Week 11 -> Celebration State
          changeQuestionState('next', () => {
            isCelebrationState = true;
            isAnswerRevealed = false;
          });
        }
      }
    }

    // Previous Action Control Flow
    function prevQuestion() {
      if (isCelebrationState) {
        changeQuestionState('prev', () => {
          isCelebrationState = false;
          currentWeekIndex = 10;
          currentQuestionIndex = 9;
          isAnswerRevealed = true; // Show last question revealed
          buildSidebar();
        });
        return;
      }
      
      if (currentQuestionIndex > 0) {
        changeQuestionState('prev', () => {
          currentQuestionIndex--;
          isAnswerRevealed = false;
        });
      } else {
        // Reached Question 1. Go back to previous week Question 10.
        if (currentWeekIndex > 0) {
          changeQuestionState('prev', () => {
            currentWeekIndex--;
            currentQuestionIndex = 9;
            isAnswerRevealed = false;
            buildSidebar();
          });
        }
      }
    }

    // Week jump selectors
    function jumpToWeek(weekIdx) {
      isCelebrationState = false;
      isDashboardState = false;
      toggleSidebar(false);
      
      currentWeekIndex = weekIdx;
      currentQuestionIndex = 0;
      isAnswerRevealed = false;
      
      document.getElementById('dashboard-view').style.display = 'none';
      document.getElementById('deck-view').style.display = 'flex';
      
      buildSidebar();
      renderCard();
    }

    // Direct question dot jump selectors
    function jumpToQuestion(qIdx) {
      if (currentQuestionIndex === qIdx) return;
      const dir = qIdx > currentQuestionIndex ? 'next' : 'prev';
      
      changeQuestionState(dir, () => {
        currentQuestionIndex = qIdx;
        isAnswerRevealed = false;
      });
    }

    function restartReview() {
      isCelebrationState = false;
      isDashboardState = false;
      toggleSidebar(false);
      
      currentWeekIndex = 0;
      currentQuestionIndex = 0;
      isAnswerRevealed = false;
      
      document.getElementById('dashboard-view').style.display = 'none';
      document.getElementById('deck-view').style.display = 'flex';
      
      buildSidebar();
      renderCard();
    }

    // Keyboard Shortcuts Listener
    window.addEventListener('keydown', (e) => {
      // If we are on the dashboard, number keys can jump to weeks 1-9
      if (isDashboardState) {
        if (e.key >= '1' && e.key <= '9') {
          const idx = parseInt(e.key) - 1;
          if (idx < weeksData.length) jumpToWeek(idx);
        }
        return;
      }

      // Disable shortcuts when sidebar is open to prevent jumping behind drawer
      const sidebar = document.getElementById('sidebar');
      if (sidebar.classList.contains('open')) {
        if (e.key === 'Escape') toggleSidebar(false);
        return;
      }
      
      switch (e.key) {
        case ' ':
          e.preventDefault(); // Prevents page scrolling
          nextQuestion();
          break;
        case 'ArrowRight':
          nextQuestion();
          break;
        case 'ArrowLeft':
          prevQuestion();
          break;
        case 'Enter':
          nextQuestion();
          break;
        case 'm':
        case 'M':
          toggleSidebar(true);
          break;
        case 'Escape':
          showDashboard();
          break;
      }
    });

    // Screen resizing listener to re-fit sizes
    window.addEventListener('resize', autoSizeCardText);

    // Initializer
    window.addEventListener('DOMContentLoaded', () => {
      const canvas = document.getElementById('confetti-canvas');
      confetti = new ConfettiEngine(canvas);
      
      buildDashboard();
      buildSidebar();
      showDashboard();
    });
  </script>
</body>
</html>
